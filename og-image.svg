<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e5d4b"/>
      <stop offset="60%" style="stop-color:#1a3d2e"/>
      <stop offset="100%" style="stop-color:#2a5040"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aab8e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7aab8e;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d4a853;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle circle pattern -->
  <circle cx="950" cy="100" r="300" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
  <circle cx="950" cy="100" r="220" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
  <circle cx="950" cy="100" r="140" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
  <circle cx="200" cy="530" r="250" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
  <circle cx="200" cy="530" r="170" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="2"/>

  <!-- Decorative leaf shapes top right -->
  <ellipse cx="1080" cy="80" rx="120" ry="55" fill="url(#leaf1)" transform="rotate(-35 1080 80)"/>
  <ellipse cx="1130" cy="140" rx="90" ry="40" fill="url(#leaf1)" transform="rotate(-20 1130 140)"/>
  <ellipse cx="1020" cy="40" rx="70" ry="30" fill="url(#leaf2)" transform="rotate(-50 1020 40)"/>

  <!-- Decorative leaf shapes bottom left -->
  <ellipse cx="100" cy="560" rx="110" ry="50" fill="url(#leaf1)" transform="rotate(25 100 560)"/>
  <ellipse cx="60" cy="500" rx="80" ry="35" fill="url(#leaf2)" transform="rotate(40 60 500)"/>

  <!-- Gold accent bar -->
  <rect x="80" y="195" width="6" height="80" rx="3" fill="#d4a853"/>

  <!-- Site name -->
  <text x="110" y="248" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">
    Nurture<tspan fill="#7aab8e" font-style="italic">Nest</tspan> Family
  </text>

  <!-- Tagline -->
  <text x="112" y="300" font-family="Georgia, serif" font-size="26" fill="rgba(255,255,255,0.7)" font-style="italic">
    Your Trusted Parenting Resource
  </text>

  <!-- Divider line -->
  <rect x="80" y="330" width="500" height="1.5" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Description -->
  <text x="82" y="372" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.75)" font-weight="400">
    Expert guides · Honest reviews · Real parenting advice
  </text>

  <!-- Feature pills -->
  <rect x="82" y="410" width="175" height="44" rx="22" fill="rgba(122,171,142,0.25)" stroke="#7aab8e" stroke-width="1.5"/>
  <text x="170" y="437" font-family="Arial, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="600">🍼 Baby Gear</text>

  <rect x="272" y="410" width="190" height="44" rx="22" fill="rgba(122,171,142,0.25)" stroke="#7aab8e" stroke-width="1.5"/>
  <text x="367" y="437" font-family="Arial, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="600">🚗 Car Seats</text>

  <rect x="477" y="410" width="190" height="44" rx="22" fill="rgba(122,171,142,0.25)" stroke="#7aab8e" stroke-width="1.5"/>
  <text x="572" y="437" font-family="Arial, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="600">🛒 Strollers</text>

  <!-- Stats row -->
  <text x="82" y="520" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#7aab8e">50+</text>
  <text x="82" y="548" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-transform="uppercase" letter-spacing="2">ARTICLES</text>

  <text x="220" y="520" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#7aab8e">4</text>
  <text x="220" y="548" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">GEAR REVIEWS</text>

  <text x="360" y="520" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#7aab8e">100%</text>
  <text x="360" y="548" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)">FREE TO READ</text>

  <!-- Website URL badge -->
  <rect x="82" y="575" width="310" height="36" rx="18" fill="rgba(212,168,83,0.2)" stroke="#d4a853" stroke-width="1.5"/>
  <text x="237" y="598" font-family="Arial, sans-serif" font-size="16" fill="#d4a853" text-anchor="middle" font-weight="600">🌿 nurturenestfamily.org</text>

  <!-- Right side big icon -->
  <text x="820" y="420" font-family="Arial" font-size="220" text-anchor="middle" opacity="0.12">🌿</text>
  <text x="840" y="390" font-family="Arial" font-size="160" text-anchor="middle" opacity="0.2">👶</text>
</svg>
